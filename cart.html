<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart | WhisperMark</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
font-family:'Poppins', sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#111;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 22px;
  font-weight: 600;
  text-decoration: none;
  color: white;
}

.logo:visited, .logo:hover {
  color: white;
  text-decoration: none;
}

.logo img {
  height: 32px;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 25px;
  transition: color 0.3s ease;
}

nav a:hover {
  color: #FF5A1F;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.item{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#FF5A1F;
border:none;
color:white;
padding:10px 15px;
cursor:pointer;
border-radius:6px;
}

.total{
font-size:22px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="WhisperMark Logo">
    <span>WhisperMark</span>
  </a>
  <nav>
    <a href="index.html">Shop</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="container">

<div id="cartItems"></div>

<div class="total" id="total"></div>

<button onclick="checkout()">Proceed to Checkout</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

let container = document.getElementById("cartItems")

let total = 0

cart.forEach((p,i)=>{

total += p.price

container.innerHTML += `
<div class="item">
<span>${p.name}</span>
<span>₹${p.price}</span>
<button onclick="removeItem(${i})">Remove</button>
</div>
`
})

document.getElementById("total").innerText = "Total: ₹"+total

function removeItem(i){

cart.splice(i,1)

localStorage.setItem("cart",JSON.stringify(cart))

location.reload()

}

function checkout(){

window.location.href="checkout.html"

}

</script>

<script src="chatbot.js"></script>

</body>
</html>
