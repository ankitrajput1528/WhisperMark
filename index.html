<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisperMark | Premium Bookmarks</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* 1. The Box-Sizing Fix */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* 5. Smooth Scrolling */
html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

/* HEADER */
header {
  background: #111;
  color: white;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 22px;
  font-weight: 600;
  text-decoration: none;
  color: white;
}

.logo:visited, .logo:hover {
  color: white;
  text-decoration: none;
}

.logo img {
  height: 32px;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 25px;
  transition: color 0.3s ease;
}

nav a:hover {
  color: #FF5A1F;
}

/* HERO */
.hero {
  height: 350px;
  background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.7)),
  url("https://images.unsplash.com/photo-1544377193-33dcf4d68fb5?q=80&w=1920&auto=format&fit=crop") center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 42px;
}

/* Added Transitions & Hover Effects */
.hero button {
  background: #FF5A1F;
  border: none;
  padding: 12px 25px;
  color: white;
  cursor: pointer;
  border-radius: 20px;
  margin-top: 20px;
  font-size: 16px;
  transition: background-color 0.3s ease, transform 0.2s ease;
}

.hero button:hover {
  background: #e04b16; 
  transform: translateY(-2px); 
}

/* PRODUCTS */
.products-section {
  padding: 50px;
  max-width: 1100px;
  margin: auto;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,.08);
  display: flex;
  flex-direction: column;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card h3 {
  margin-bottom: 5px;
  color: #111;
}

.price {
  color: #FF5A1F;
  font-weight: 600;
  margin-bottom: 10px;
}

/* Added Transitions */
.card button {
  background: #111;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-top: auto;
  font-size: 15px;
  transition: background-color 0.3s ease, transform 0.2s ease;
}

.card button:hover {
  background: #FF5A1F;
  transform: translateY(-2px);
}

/* FOOTER */
footer {
  background: #111;
  color: #aaa;
  text-align: center;
  padding: 30px;
  margin-top: 60px;
}

/* 4. Mobile Responsiveness */
@media (max-width: 600px) {
  header {
    flex-direction: column;
    gap: 15px;
    padding: 15px 20px;
  }
  nav a {
    margin: 0 10px;
  }
  .hero h1 {
    font-size: 32px;
    padding: 0 15px;
  }
}
</style>
</head>

<body>

<header>
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="WhisperMark Logo">
    <span>WhisperMark</span>
  </a>

  <nav>
    <a href="#products-section">Shop</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <section class="hero">
    <h1>Mark Your Story</h1>
    <a href="#products-section" style="text-decoration:none;">
      <button>Browse Bookmarks</button>
    </a>
  </section>

  <section class="products-section" id="products-section">
    <h2 style="text-align:center; margin-bottom:30px;">Our Collection</h2>
    <div class="products" id="products"></div>
  </section>
</main>

<footer>
  WhisperMark © 2026
</footer>

<script>
/* LOAD PRODUCTS FROM MONGODB */
async function loadProducts() {
  let container = document.getElementById("products");
  container.innerHTML = "Loading bookmarks...";

  try {
    let res = await fetch("/products");
    let data = await res.json();
    
    // 2. The DOM Re-rendering Fix: Build string first
    let productsHTML = "";

    data.forEach(p => {
      productsHTML += `
        <div class="card">
          <img src="${p.image}" alt="${p.name}">
          <h3>${p.name}</h3>
          <div class="price">₹${p.price}</div>
          <button>Add to Cart</button>
        </div>
      `;
    });

    // Inject into the DOM exactly once
    container.innerHTML = productsHTML;

  } catch(err) {
    // Improved error state
    container.innerHTML = "<p style='text-align:center; color:red; font-weight: 600;'>Could not load products. Please check if your local server is running.</p>";
    console.error("Error fetching products:", err);
  }
}

loadProducts();
</script>

<script src="chatbot.js"></script>

</body>
</html>
